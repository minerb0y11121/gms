function formatGameName(path) {
    return path
        .replace(/\/$/, "")
        .replace(/[-_]/g, " ")
        .split(" ")
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
}

games.forEach((path) => {
    const link = document.createElement("a");
    link.className = "game";
    link.href = path;
    link.textContent = `Play ${formatGameName(path)}`;
    container.appendChild(link);
});
