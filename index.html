<!DOCTYPE html>
<html>
<head>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  text-align: center;
}

h1 { margin-top: 20px; }

#searchBar {
  padding: 10px;
  width: 340px;
  font-size: 16px;
  margin: 20px;
  border-radius: 6px;
  border: none;
}

.games {
  display: flex;
  flex-wrap: wrap;

.game {
  margin: 10px;

  background: #1a1a1a;

}

  padding: 8px 14px;
  margin-top: 10px;
  border: none;
  background: lime;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

button:hover { background: #00ff88; }

#passInput {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: black;
  color: lime;
  border: 1px solid lime;
  padding: 6px;
}

#hackerConsole {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: lime;
  padding: 20px;
  overflow-y: auto;
}

#terminal {
  text-align: left;
  max-width: 900px;
  margin: auto;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

];

const container = document.getElementById("gameContainer");

function formatTitle(slug) {
  return slug.replace(/\//g,'')
             .replace(/-/g,' ')
             .replace(/\b\w/g, l => l.toUpperCase());
}

gameFolders.forEach(folder => {
  const div = document.createElement("div");
  div.className = "game";
  div.setAttribute("data-name", folder);

  div.innerHTML = `
    <h3>${formatTitle(folder)}</h3>
    <button onclick="openGame('${folder}')">Play</button>
  `;

  container.appendChild(div);
});

function openGame(folder){
  window.open(folder, "_blank");
}

function searchGames(){
  let input = document.getElementById("searchBar").value.toLowerCase();
  let games = document.getElementsByClassName("game");
  for(let i=0;i<games.length;i++){
    let name = games[i].getAttribute("data-name").toLowerCase();
    games[i].style.display = name.includes(input) ? "block" : "none";
  }
}

/* PASSCODE */
document.getElementById("passInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){
if(this.value==="minerdabest"){
document.getElementById("hackerConsole").style.display="block";
startMatrix();
boot();
}else{
alert("ACCESS DENIED");
}
}
});

/* TERMINAL */
const terminal=document.getElementById("terminal");
document.getElementById("commandInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){
let cmd=this.value;
terminal.innerHTML+="> "+cmd+"<br>";
switch(cmd){
case "help": terminal.innerHTML+="help clear files hack scan ip mine trace<br>"; break;
case "clear": terminal.innerHTML=""; break;
case "files": terminal.innerHTML+="root.key<br>wallet.dat<br>admin.log<br>"; break;
case "hack": terminal.innerHTML+="Firewall bypassed.<br>Access complete.<br>"; break;
case "scan": terminal.innerHTML+="Scanning... 12 devices found.<br>"; break;
case "ip": terminal.innerHTML+="IP: 192.168."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"<br>"; break;
case "mine": terminal.innerHTML+="Mining crypto... "+Math.floor(Math.random()*10000)+" coins<br>"; break;
case "trace": terminal.innerHTML+="Trace detected... Masked successfully.<br>"; break;
default: terminal.innerHTML+="Unknown command<br>";
}
this.value="";
}
});

/* BOOT */
function boot(){
terminal.innerHTML+="Initializing system...<br>";
setTimeout(()=>terminal.innerHTML+="Connecting to darknet...<br>",500);
setTimeout(()=>terminal.innerHTML+="Access granted.<br>",1000);
}
