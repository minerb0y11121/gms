<!DOCTYPE html>
<html>
<head>
<title>GMS Arcade</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#searchBar {
  padding: 10px;
  width: 300px;
  font-size: 16px;
  margin: 20px;
  border-radius: 5px;
  border: none;
}

.games {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.game {
  margin: 15px;
  padding: 15px;
  background: #111;
  border-radius: 10px;
  width: 200px;
  transition: 0.3s;
}

.game:hover {
  background: #1a1a1a;
  transform: scale(1.05);
}

button {
  padding: 8px 15px;
  margin-top: 10px;
  border: none;
  background: lime;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #00ff88;
}

#passInput {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: black;
  color: lime;
  border: 1px solid lime;
  padding: 5px;
}

#hackerConsole {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: lime;
  padding: 20px;
  overflow-y: auto;
}

#terminal {
  text-align: left;
  max-width: 800px;
  margin: auto;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<h1>🎮 GMS Arcade</h1>

<input type="text" id="searchBar" placeholder="Search games..." onkeyup="searchGames()">

<div class="games" id="gameContainer">

  <!-- ADD OR EDIT GAMES BELOW -->

  <div class="game" data-name="Slope">
    <h3>Slope</h3>
    <button onclick="openGame('https://ubg365.github.io/slope/')">Play</button>
  </div>

  <div class="game" data-name="1v1 LOL">
    <h3>1v1 LOL</h3>
    <button onclick="openGame('https://ubg365.github.io/1v1lol/')">Play</button>
  </div>

  <div class="game" data-name="Run 3">
    <h3>Run 3</h3>
    <button onclick="openGame('https://ubg365.github.io/run3/')">Play</button>
  </div>

  <div class="game" data-name="Drift Hunters">
    <h3>Drift Hunters</h3>
    <button onclick="openGame('https://ubg365.github.io/drifthunters/')">Play</button>
  </div>

  <div class="game" data-name="Minecraft Classic">
    <h3>Minecraft Classic</h3>
    <button onclick="openGame('https://classic.minecraft.net/')">Play</button>
  </div>

  <div class="game" data-name="Tetris">
    <h3>Tetris</h3>
    <button onclick="openGame('https://tetris.com/play-tetris')">Play</button>
  </div>

</div>

<input type="text" id="passInput" placeholder="Enter passcode...">

<div id="hackerConsole">
  <h2>🔓 ACCESS GRANTED</h2>
  <div id="terminal"></div>
  <input type="text" id="commandInput" placeholder="Enter command...">
</div>

<canvas id="matrix"></canvas>

<script>
function openGame(url) {
  window.open(url, "_blank");
}

function searchGames() {
  let input = document.getElementById("searchBar").value.toLowerCase();
  let games = document.getElementsByClassName("game");

  for (let i = 0; i < games.length; i++) {
    let name = games[i].getAttribute("data-name").toLowerCase();
    games[i].style.display = name.includes(input) ? "block" : "none";
  }
}

// PASSCODE SYSTEM
document.getElementById("passInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (this.value === "minerdabest") {
      document.getElementById("hackerConsole").style.display = "block";
      startMatrix();
      bootSequence();
    } else {
      alert("ACCESS DENIED");
    }
  }
});

// HACKER TERMINAL
const terminal = document.getElementById("terminal");
document.getElementById("commandInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let cmd = this.value;
    terminal.innerHTML += "> " + cmd + "<br>";

    if (cmd === "help") {
      terminal.innerHTML += "Commands: help, clear, files, hack, ip, scan<br>";
    }
    else if (cmd === "clear") {
      terminal.innerHTML = "";
    }
    else if (cmd === "files") {
      terminal.innerHTML += "secret.txt<br>admin.log<br>crypto_wallet.dat<br>";
    }
    else if (cmd === "hack") {
      terminal.innerHTML += "Bypassing firewall...<br>Injecting payload...<br>HACK SUCCESSFUL<br>";
    }
    else if (cmd === "ip") {
      terminal.innerHTML += "IP Located: 192.168.0." + Math.floor(Math.random()*255) + "<br>";
    }
    else if (cmd === "scan") {
      terminal.innerHTML += "Scanning network...<br>3 devices found<br>";
    }
    else {
      terminal.innerHTML += "Unknown command<br>";
    }

    this.value = "";
  }
});

// Boot animation
function bootSequence() {
  terminal.innerHTML += "Initializing system...<br>";
  setTimeout(() => terminal.innerHTML += "Connecting to secure server...<br>", 500);
  setTimeout(() => terminal.innerHTML += "Access granted.<br>", 1000);
}

// MATRIX EFFECT
function startMatrix() {
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = [];

  for (let x = 0; x < columns; x++)
    drops[x] = 1;

  function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters.charAt(Math.floor(Math.random()*letters.length));
      ctx.fillText(text, i*fontSize, drops[i]*fontSize);

      if (drops[i]*fontSize > canvas.height && Math.random() > 0.975)
        drops[i] = 0;

      drops[i]++;
    }
  }

  setInterval(draw, 33);
}
</script>

</body>
</html>
