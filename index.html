<!DOCTYPE html>
<html>
<head>
<title>GMS Arcade</title>
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  padding: 20px;
}

.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.game-card {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  transition: 0.2s;
  cursor: pointer;
}

.game-card:hover {
  background: #333;
  transform: scale(1.05);
}

/* Secret input */
.secret {
  margin: 40px 0;
}

.secret input {
  padding: 8px;
}

.secret button {
  padding: 8px 12px;
  cursor: pointer;
}

/* Terminal */
#terminalOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  color: lime;
  font-family: monospace;
  z-index: 9999;
  padding: 20px;
  overflow: auto;
}

#terminalOutput {
  white-space: pre-wrap;
  margin-bottom: 20px;
}

#terminalInput {
  background: black;
  border: 1px solid lime;
  color: lime;
  padding: 5px;
  width: 300px;
}

/* Matrix canvas */
#matrixCanvas {
  position: fixed;
  inset: 0;
  z-index: -1;
}
</style>
</head>

<body>

<canvas id="matrixCanvas"></canvas>

<h1>🎮 GMS Arcade</h1>

<div class="game-grid">
  <div class="game-card" onclick="alert('Game 1 placeholder')">Game 1</div>
  <div class="game-card" onclick="alert('Game 2 placeholder')">Game 2</div>
  <div class="game-card" onclick="alert('Game 3 placeholder')">Game 3</div>
  <div class="game-card" onclick="alert('Game 4 placeholder')">Game 4</div>
</div>

<div class="secret">
  <input id="codeInput" placeholder="Enter Access Code">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- Terminal Overlay -->
<div id="terminalOverlay">
  <div id="terminalOutput"></div>
  <input id="terminalInput" placeholder="Type command..." onkeydown="handleCommand(event)">
</div>

<script>
// ================== SECRET UNLOCK ==================

function unlock() {
  const code = document.getElementById("codeInput").value;

  if (code === "shadow1337") {
    localStorage.setItem("terminalUnlocked", "true");
    openTerminal();
  } else {
    alert("Access Denied");
  }
}

function openTerminal() {
  if (localStorage.getItem("terminalUnlocked") === "true") {
    document.getElementById("terminalOverlay").style.display = "block";
    startBootSequence();
  }
}

// ================== BOOT SEQUENCE ==================

function startBootSequence() {
  const output = document.getElementById("terminalOutput");
  const text = `
Initializing system...
Connecting to secure network...
Bypassing firewall...
Decrypting credentials...
ACCESS GRANTED.

Welcome, Agent.
Type 'help' for commands.
`;

  let i = 0;
  output.innerHTML = "";

  function type() {
    if (i < text.length) {
      output.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 25);
    }
  }
  type();
}

// ================== COMMAND SYSTEM ==================

function handleCommand(e) {
  if (e.key === "Enter") {
    const input = document.getElementById("terminalInput");
    const cmd = input.value.trim().toLowerCase();
    const output = document.getElementById("terminalOutput");

    output.innerHTML += "\n> " + cmd + "\n";

    switch (cmd) {
      case "help":
        output.innerHTML += "Commands:\nhelp\nscan\ntrace\nclear\nexit\n";
        break;

      case "scan":
        output.innerHTML += "Scanning network...\nIP Found: 192.168.0." + Math.floor(Math.random()*255) + "\n";
        break;

      case "trace":
        output.innerHTML += "Tracing signal...\nLocation: UNKNOWN\n";
        break;

      case "clear":
        output.innerHTML = "";
        break;

      case "exit":
        document.getElementById("terminalOverlay").style.display = "none";
        break;

      default:
        output.innerHTML += "Unknown command.\n";
    }

    output.scrollTop = output.scrollHeight;
    input.value = "";
  }
}

// ================== MATRIX RAIN ==================

const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) {
  drops[x] = 1;
}

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "lime";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(drawMatrix, 33);

// Resize support
window.onresize = () => {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
};
</script>

</body>
</html>
