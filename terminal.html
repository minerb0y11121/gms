<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  padding: 20px;
}
#output {
  white-space: pre-wrap;
}
</style>
</head>
<body>

<h2>SECURE TERMINAL</h2>
<div id="output"></div>

<script>
if (localStorage.getItem("terminalUnlocked") !== "true") {
  window.location.href = "index.html";
}

const text = `
Initializing system...
Accessing mainframe...
Bypassing firewall...
ACCESS GRANTED.

Welcome, Agent.
`;

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("output").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}
typeWriter();
</script>

</body>
</html>
